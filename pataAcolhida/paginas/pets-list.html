<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encontrar Pet - Pata Acolhida</title>
    <link rel="stylesheet" href="../style.css"> </head>
<body>

    <header>
        <h2>🐾 Pata Acolhida</h2>
        <nav>
            <a href="../index.html">Início</a>
            <a href="pets-list.html">Encontrar Pet</a>
            <a href="how-adopt.html">Como Adotar</a>
            <a href="ongs.html">ONGs Parceiras</a>
            <a href="about-we.html">Sobre Nós</a>
        </nav>
        <div class="auth-buttons">
            <a href="../login.html" style="text-decoration: none;"><button>Entrar</button></a>
        </div>
    </header>

    <main class="featured-pets">
        <div class="section-title">
            <h2>Todos os Pets para Adoção</h2>
            <p>Explore todos os amigos que estão à procura de um novo lar.</p>
        </div>

        <div class="search-pets-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; max-width: 1200px; margin: 0 auto; width: 100%;">
            </div>

        <div id="lista-vazia-busca" style="display: none; text-align: center; margin: 40px 0; color: #777;">
            Nenhum pet cadastrado no momento.
        </div>
    </main>
    <div id="modal-adotar" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;">
        <div style="background-color: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 450px; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.3);">
            <span style="position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #666;" onclick="fecharModalAdotar()">&times;</span>
            
            <h3 style="color: #004d40;">Formulário de Adoção</h3>
            <p>Você está demonstrando interesse em adotar o(a) <strong id="adotar-nome-pet">...</strong></p>
            <br>
            
            <form id="form-solicitar-adocao">
                <input type="hidden" id="adotar-index-pet">

                <div class="form-group">
                    <label for="adotante-nome">Seu Nome Completo:</label>
                    <input type="text" id="adotante-nome" placeholder="Digite seu nome" required>
                </div>

                <div class="form-group">
                    <label for="adotante-telefone">Telefone de Contato (WhatsApp):</label>
                    <input type="tel" id="adotante-telefone" placeholder="(00) 99999-9999" required>
                </div>

                <div class="form-group">
                    <label for="adotante-email">Seu E-mail:</label>
                    <input type="email" id="adotante-email" placeholder="nome@email.com" required>
                </div>

                <button type="submit" class="btn-enviar-cadastro">Confirmar Interesse em Adotar</button>
            </form>
        </div>
    </div>

    <script src="../script.js"></script>
</body>
</html>

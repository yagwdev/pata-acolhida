<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pata Acolhida</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1eded; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">

    <main class="form-container" style="margin: 0; width: 100%; max-width: 400px;">
        <h2 style="text-align: center;">Acessar o Sistema</h2>
        <p style="text-align: center;">Selecione seu perfil e faça login.</p>

        <form id="form-login">
            <div class="form-group">
                <label for="login-perfil">Tipo de Perfil:</label>
                <select id="login-perfil" required>
                    <option value="">Selecione...</option>
                    <option value="adm">Administrador (Controlador)</option>
                    <option value="org">ONG Parceira</option>
                </select>
            </div>

            <div class="form-group">
                <label for="login-email">E-mail:</label>
                <input type="email" id="login-email" placeholder="Ex: yagobacana@pata.com" required>
            </div>

            <div class="form-group">
                <label for="login-senha">Senha:</label>
                <input type="password" id="login-senha" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-enviar-cadastro">Entrar</button>
        </form>
        
        <div style="text-align: center; margin-top: 15px;">
            <a href="index.html" style="color: #004d40; text-decoration: none; font-size: 14px; font-weight: bold;">← Voltar ao início</a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
